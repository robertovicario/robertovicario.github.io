<div class="content-wrap">
    <div class="container">
        <div class="pt-60 pb-130 mt-30">
            <div class="row gh-1 gv-5 align-items-center justify-content-center text-center text-lg-start">
                <div class="col-auto order-1 order-lg-3 show-on-scroll" data-show-delay="200" data-show-duration="600">
                    <div class="shape-parent lines-style-2">
                        <div class="line text-dark"></div>
                        <div class="shape mt-n30 ms-n30 me-100 me-lg-0 d-block">
                            <svg data-rellax-speed="-1" width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="45" cy="45" r="45" fill="#F5F5F5" />
                            </svg>
                        </div>
                        <img class="position-relative rounded-circle" width="180" src="assets/img/avatar/Profile-Social.png" alt="">
                    </div>
                </div>
                <div class="d-none d-lg-block col order-lg-2"></div>
                <div class="col-12 col-lg-6 order-3 order-lg-1">
                    <h1 class="h2 show-on-scroll" data-show-duration="500" data-show-distance="15">Dive in and see what I've been up to 🤟🏻</h1>
                    <a href="contacts.html" class="btn btn-dark btn-with-ball mt-5 show-on-scroll" data-show-duration="400" data-show-delay="100" data-show-distance="15">let's work</a>
                </div>
                <div class="col-12 col-lg-2 text-center text-lg-end order-2 order-lg-4 mt-n60 mt-lg-0">
                    <ul class="nav nav-gap-sm d-inline-flex align-items-center flex-lg-column">
                        <li class="nav-item">
                            <a href="https://www.instagram.com/__roberrevil" target="_blank" rel="noopener noreferrer" class="nav-link">
                                <i class="fa-brands fa-instagram" style="font-size: 24px;"></i>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="https://www.linkedin.com/in/robertovicario" target="_blank" rel="noopener noreferrer" class="nav-link">
                                <i class="fa-brands fa-linkedin-in" style="font-size: 24px;"></i>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="https://github.com/robertovicario" target="_blank" rel="noopener noreferrer" class="nav-link">
                                <i class="fa-brands fa-github" style="font-size: 24px;"></i>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="pb-160 isotope text-center">
            <ul class="nav justify-content-center isotope-options mb-60 show-on-scroll" data-show-duration="500">
                <li class="nav-item active show-on-scroll" data-show-duration="500" data-show-distance="10" data-show-delay="100">
                    <a href="#" data-filter="all" class="nav-link">
                        <div class="nav-link-name">all</div>
                    </a>
                </li>
                <li class="nav-item show-on-scroll" data-show-duration="500" data-show-distance="10" data-show-delay="150">
                    <a href="#" data-filter="software" class="nav-link">
                        <div class="nav-link-name">software</div>
                    </a>
                </li>
                <li class="nav-item show-on-scroll" data-show-duration="500" data-show-distance="10" data-show-delay="200">
                    <a href="#" data-filter="web" class="nav-link">
                        <div class="nav-link-name">web</div>
                    </a>
                </li>
                <li class="nav-item show-on-scroll" data-show-duration="500" data-show-distance="10" data-show-delay="200">
                    <a href="#" data-filter="electronics" class="nav-link">
                        <div class="nav-link-name">electronics</div>
                    </a>
                </li>
                <li class="nav-item show-on-scroll" data-show-duration="500" data-show-distance="10" data-show-delay="250">
                    <a href="#" data-filter="ai" class="nav-link">
                        <div class="nav-link-name">AI</div>
                    </a>
                </li>
                <li class="nav-item show-on-scroll" data-show-duration="500" data-show-distance="10" data-show-delay="300">
                    <a href="#" data-filter="design" class="nav-link">
                        <div class="nav-link-name">design</div>
                    </a>
                </li>
                <li class="nav-item show-on-scroll" data-show-duration="500" data-show-distance="10" data-show-delay="300">
                    <a href="#" data-filter="learning" class="nav-link">
                        <div class="nav-link-name">learning</div>
                    </a>
                </li>
                <li class="nav-item show-on-scroll" data-show-duration="500" data-show-distance="10" data-show-delay="300">
                    <a href="#" data-filter="research" class="nav-link">
                        <div class="nav-link-name">research</div>
                    </a>
                </li>
            </ul>
            <div class="pt-30 show-on-scroll" data-show-duration="800">
                <div class="row gh-1 gv-1 isotope-grid">

                    {% for project in page.data.portfolio.projects %}
                    <!-- Projects -->
                    <div class="col-12 col-sm-6 col-md-4 isotope-item">
                        <a class="card card-portfolio card-overlay card-image-lg card-hover-appearance text-white text-center" href="{{ project.link }}" rel="noopener noreferrer">
                            <span class="card-img">
                            <img src="{{ project.image }}" alt="{{ project.name }}">
                            <span class="background-color" style="background-color: rgba(14, 14, 14, 0.7);"></span>
                            </span>
                            <span class="card-img-overlay">
                            <span class="card-title h4">{{ project.name }}</span>
                            <span class="card-category subtitle">{{ project.description }}</span>
                            </span>
                            <span style="position: absolute; top: 20px; right: 20px; font-size: 24px;">&#128204;</span>
                        </a>
                    </div>
                    {% endfor %}

                </div>
            </div>            
        </div>
    </div>
</div>
